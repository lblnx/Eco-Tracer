version: '3.8'

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./ecotracker-backend/src:/app/src
    # Simula un servidor HTTP básico solo para desarrollo local
    command: python -m http.server 8000 --directory src
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    volumes:
      - ./ecotracker-frontend/public:/usr/share/nginx/html
    ports:
      - "3000:80"
    depends_on:
      - backend