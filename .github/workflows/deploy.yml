# =============================================================================
# DressFlow — Workflow de Despliegue Continuo (CD)
# Archivo: .github/workflows/deploy.yml
#
# Propósito: Ejecutar pruebas unitarias y, si pasan, desplegar automáticamente
#            a Cloudflare Pages usando Wrangler CLI.
# Triggers:  Push a 'main' o PR aprobado hacia 'main'.
# Secrets requeridos en GitHub:
#   - CLOUDFLARE_API_TOKEN   → Token de API de Cloudflare (permisos: Pages, D1)
#   - CLOUDFLARE_ACCOUNT_ID  → ID de cuenta de Cloudflare
# =============================================================================

name: 🚀 Deploy DressFlow to Cloudflare Pages

on:
  push:
    branches:
      - main          # Despliegue automático al fusionar en main
  pull_request:
    branches:
      - main          # Valida PRs antes de hacer merge (sin desplegar)
  workflow_dispatch:  # Permite ejecución manual desde la UI de GitHub

# Evitar despliegues simultáneos que puedan causar conflictos
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WRANGLER_VERSION: '3'

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Ejecutar pruebas unitarias (requerido antes del despliegue)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: ✅ Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'             # Cache de dependencias para acelerar builds

      - name: 📦 Install dependencies
        run: npm ci                # 'ci' garantiza instalación limpia desde lockfile

      - name: 🧪 Run unit tests with coverage
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true                 # Modo CI desactiva prompts interactivos

      - name: 📊 Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()              # Sube el reporte incluso si los tests fallan
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 2: Despliegue a Cloudflare Pages (solo en push a main)
  # ---------------------------------------------------------------------------
  deploy:
    name: 🌐 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: unit-tests             # BLOQUEANTE: no despliega si los tests fallan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      deployments: write          # Necesario para registrar el deployment en GitHub

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install Wrangler CLI
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: 🗄️ Apply D1 database migrations
        run: |
          echo "Applying pending migrations to Cloudflare D1..."
          wrangler d1 migrations apply dressflow-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🚀 Deploy to Cloudflare Pages
        run: |
          echo "Deploying DressFlow to Cloudflare Pages..."
          wrangler pages deploy src/ \
            --project-name=dressflow \
            --commit-dirty=false \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 📝 Post deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch   | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit   | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL      | https://dressflow.pages.dev |" >> $GITHUB_STEP_SUMMARY